name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-api:
    name: API — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: indor_test
          POSTGRES_PASSWORD: indor_test
          POSTGRES_DB: indor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: indor/services/api

    env:
      DATABASE_URL: postgresql://indor_test:indor_test@localhost:5432/indor_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-not-for-production
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-not-for-production
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: indor/services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run unit tests
        run: npm test

  build-web:
    name: Web — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indor/apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: indor/apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: '1'

  docker-build:
    name: Docker — Image Build
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./indor/services/api
          push: false
          tags: indor-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./indor/apps/web
          push: false
          tags: indor-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
