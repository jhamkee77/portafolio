name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build-api:
    name: API — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indor/services/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: indor/services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  test-api:
    name: API — Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-build-api

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: indor_test
          POSTGRES_PASSWORD: indor_test
          POSTGRES_DB: indor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: indor/services/api

    env:
      DATABASE_URL: postgresql://indor_test:indor_test@localhost:5432/indor_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-not-for-production
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-not-for-production
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: indor/services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: indor/services/api/coverage/

  lint-and-build-web:
    name: Web — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indor/apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: indor/apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  e2e:
    name: Web — Playwright E2E
    runs-on: ubuntu-latest
    needs: [test-api, lint-and-build-web]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install API dependencies
        run: npm ci
        working-directory: indor/services/api

      - name: Install Web dependencies
        run: npm ci
        working-directory: indor/apps/web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: indor/apps/web

      - name: Run E2E tests
        run: npx playwright test
        working-directory: indor/apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: indor/apps/web/playwright-report/
